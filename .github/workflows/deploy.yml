name: CareerTwin AI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 backend/app --max-line-length=120 --ignore=E402,W503 || true

  # ── Frontend build ────────────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build

  # ── Deploy backend to Railway ─────────────────────────────────────────────
  deploy-backend:
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Skip when Railway token is missing
        if: ${{ env.RAILWAY_TOKEN == '' }}
        run: echo "RAILWAY_TOKEN is not configured; skipping backend deploy."
      - name: Validate Railway token
        id: railway-auth
        if: ${{ env.RAILWAY_TOKEN != '' }}
        continue-on-error: true
        run: railway whoami >/dev/null
      - name: Skip when Railway token is invalid
        if: ${{ env.RAILWAY_TOKEN != '' && steps.railway-auth.outcome != 'success' }}
        run: echo "RAILWAY_TOKEN is invalid or unauthorized; skipping backend deploy."
      - name: Deploy to Railway
        if: ${{ env.RAILWAY_TOKEN != '' && steps.railway-auth.outcome == 'success' }}
        run: railway up --service careertwin-backend

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────
  deploy-frontend:
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip when Vercel secrets are missing
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: echo "Vercel secrets are not fully configured; skipping frontend deploy."
      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
