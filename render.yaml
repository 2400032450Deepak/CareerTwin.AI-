services:
  - type: web
    name: careertwin-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careertwin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: careertwin-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/health

  - type: redis
    name: careertwin-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: careertwin-db
    plan: free
    databaseName: careertwin_db
    user: careertwin
